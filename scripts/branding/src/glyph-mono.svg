<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Solid-white glyph on transparent: Android status-bar (ic_stat) icons are
       tinted by the OS, so the whole mark must be a single white silhouette. -->
  <g transform="translate(256,256) scale(0.72) translate(-290,-256)"
     fill="none" stroke="#ffffff" stroke-width="72" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 140 L240 256 L120 372"/>
    <path d="M340 372 L460 372"/>
  </g>
</svg>
