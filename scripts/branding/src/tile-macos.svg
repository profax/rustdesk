<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- macOS icns: Apple HIG leaves ~10% transparent margin around a rounded
       tile (~22.4% corner radius). Glyph a touch smaller to sit inside it. -->
  <rect x="50" y="50" width="412" height="412" rx="92" fill="#0f172a"/>
  <g transform="translate(256,256) scale(0.50) translate(-290,-256)"
     fill="none" stroke-width="72" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 140 L240 256 L120 372" stroke="#f1f5f9"/>
    <path d="M340 372 L460 372" stroke="#22c55e"/>
  </g>
</svg>
