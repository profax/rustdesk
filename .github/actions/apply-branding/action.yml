name: Apply Armilen branding
description: >
  Patches sources that live in upstream-tracking submodules. The submodules
  keep pointing at rustdesk/* (no second fork to maintain), so upstream syncs
  stay conflict-free; every rebrand patch of submodule code must live in this
  action, not in the workflows that call it.
runs:
  using: composite
  steps:
    - name: Set APP_NAME to Armilen Remote in libs/hbb_common
      shell: bash
      run: |
        set -euo pipefail
        cfg="libs/hbb_common/src/config.rs"
        if grep -qF 'RwLock::new("Armilen Remote".to_owned())' "$cfg"; then
          echo "Branding already applied, skipping"
          exit 0
        fi
        if ! grep -qF 'APP_NAME: RwLock<String> = RwLock::new("RustDesk".to_owned())' "$cfg"; then
          echo "::error file=$cfg::APP_NAME pattern not found, upstream changed the line; update this action"
          exit 1
        fi
        # -i.bak + rm works with both GNU sed (Linux, Git Bash on Windows) and BSD sed (macOS)
        sed -i.bak 's/APP_NAME: RwLock<String> = RwLock::new("RustDesk"\.to_owned())/APP_NAME: RwLock<String> = RwLock::new("Armilen Remote".to_owned())/' "$cfg"
        rm -f "$cfg.bak"
        grep -F 'APP_NAME: RwLock' "$cfg"

    - name: Default ID/relay server to armilen.ru in libs/hbb_common
      shell: bash
      run: |
        set -euo pipefail
        cfg="libs/hbb_common/src/config.rs"
        if grep -qF 'RENDEZVOUS_SERVERS: &[&str] = &["www.armilen.ru"]' "$cfg"; then
          echo "Branding already applied, skipping"
          exit 0
        fi
        if ! grep -qF 'RENDEZVOUS_SERVERS: &[&str] = &["rs-ny.rustdesk.com"]' "$cfg"; then
          echo "::error file=$cfg::RENDEZVOUS_SERVERS pattern not found, upstream changed the line; update this action"
          exit 1
        fi
        if ! grep -qF 'RS_PUB_KEY: &str = "OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=";' "$cfg"; then
          echo "::error file=$cfg::RS_PUB_KEY pattern not found, upstream changed the line; update this action"
          exit 1
        fi
        # Без этого клиент по умолчанию соединяется через публичный
        # rs-ny.rustdesk.com (чужой сервер, платный трафик и чужая точка
        # доверия), а UI показывает "настройте собственный сервер" - хотя
        # свой ID/relay (hbbs/hbbr) у нас уже поднят. Значения те же, что
        # даём вручную для официального iOS-клиента (src/content/guides/
        # remote-ios.yaml в armilen-site).
        sed -i.bak 's/RENDEZVOUS_SERVERS: &\[&str\] = &\["rs-ny\.rustdesk\.com"\]/RENDEZVOUS_SERVERS: \&[\&str] = \&["www.armilen.ru"]/' "$cfg"
        sed -i.bak 's#RS_PUB_KEY: &str = "OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=";#RS_PUB_KEY: \&str = "GYxvuB12rp2WdQoykP0y2Whrw9sD7hpPJkTlp8LS7C0=";#' "$cfg"
        rm -f "$cfg.bak"
        grep -F 'RENDEZVOUS_SERVERS: &[&str]' "$cfg"
        grep -F 'RS_PUB_KEY: &str' "$cfg"

    - name: Point version-check URL at armilen.ru in libs/hbb_common
      shell: bash
      run: |
        set -euo pipefail
        cfg="libs/hbb_common/src/lib.rs"
        if grep -qF 'const URL: &str = "https://www.armilen.ru/api/version-check";' "$cfg"; then
          echo "Branding already applied, skipping"
          exit 0
        fi
        if ! grep -qF 'const URL: &str = "https://api.rustdesk.com/version/latest";' "$cfg"; then
          echo "::error file=$cfg::version-check URL pattern not found, upstream changed the line; update this action"
          exit 1
        fi
        # Свой апдейт-чек: api.rustdesk.com/version/latest заменяем на наш
        # эндпойнт (armilen-site server/lead-server.mjs), чтобы кастомные
        # клиенты узнавали о новых сборках, а не молчали или не дёргали офф. апстрим.
        sed -i.bak 's#const URL: &str = "https://api.rustdesk.com/version/latest";#const URL: \&str = "https://www.armilen.ru/api/version-check";#' "$cfg"
        rm -f "$cfg.bak"
        grep -F 'const URL: &str' "$cfg"
